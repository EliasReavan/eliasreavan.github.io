<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elias Reavan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Raleway:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #080808;
      --deep: #0e0c0f;
      --surface: #141118;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --silver: #a0a0b0;
      --white: #f0ede8;
      --accent: #7a3f5e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 60px;
      background: linear-gradient(to bottom, rgba(8,8,8,0.95), transparent);
    }
    .nav-logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 40px; align-items: center; }
    .nav-links a {
      font-family: 'Raleway', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--silver);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--gold); }
    .lang-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      background: transparent;
      border: 1px solid rgba(201,168,76,0.3);
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .lang-btn:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }

    #hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 60%, rgba(122,63,94,0.15) 0%, transparent 70%),
        linear-gradient(160deg, #0a0810 0%, #080608 50%, #0c090d 100%);
    }
    .hero-lines {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
      background-size: 80px 80px;
    }
    .hero-content { position: relative; z-index: 2; }
    .hero-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 28px;
      animation: fadeUp 1s 0.3s both;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4rem, 10vw, 9rem);
      font-weight: 300;
      line-height: 0.9;
      color: var(--white);
      animation: fadeUp 1.2s 0.5s both;
    }
    .hero-title em { font-style: italic; color: var(--gold-light); }
    .hero-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: var(--silver);
      margin-top: 28px;
      animation: fadeUp 1s 0.9s both;
    }
    .hero-divider {
      width: 1px; height: 80px;
      background: linear-gradient(to bottom, transparent, var(--gold), transparent);
      margin: 50px auto 0;
      animation: fadeIn 1s 1.4s both;
    }
    .scroll-hint {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--silver);
      text-transform: uppercase;
      margin-top: 16px;
      animation: fadeIn 1s 1.6s both;
    }

    section { padding: 120px 60px; max-width: 1200px; margin: 0 auto; }

    .section-label {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 60px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(201,168,76,0.4), transparent);
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 40px;
    }
    .section-title em { font-style: italic; color: var(--gold-light); }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    #about { padding-top: 60px; }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
    .about-text p { font-size: 1rem; line-height: 1.9; color: var(--silver); margin-bottom: 20px; }
    .about-text p strong { color: var(--white); font-weight: 400; }
    .about-portrait { position: relative; aspect-ratio: 3/4; background: var(--surface); overflow: hidden; }
    .about-portrait img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .about-portrait::after { content: ''; position: absolute; inset: 0; border: 1px solid rgba(201,168,76,0.2); pointer-events: none; }
    .portrait-corner { position: absolute; width: 30px; height: 30px; border-color: var(--gold); border-style: solid; z-index: 2; }
    .portrait-corner.tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
    .portrait-corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
    .portrait-corner.bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }
    .portrait-corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

    #music { background: var(--deep); padding: 120px 0; max-width: none; }
    #music > .inner { max-width: 1200px; margin: 0 auto; padding: 0 60px; }
    .music-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 60px; }
    .track-card {
      position: relative;
      background: var(--surface);
      padding: 40px 36px;
      overflow: hidden;
      transition: transform 0.4s ease;
    }
    .track-card::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(to right, var(--gold), var(--accent));
      transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease;
    }
    .track-card:hover::before { transform: scaleX(1); }
    .track-card:hover { transform: translateY(-4px); }
    .track-number { font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.3em; color: rgba(201,168,76,0.4); margin-bottom: 24px; }
    .track-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; margin-bottom: 8px; }
    .track-genre { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--silver); text-transform: uppercase; margin-bottom: 24px; }
    .track-desc { font-size: 0.85rem; line-height: 1.7; color: rgba(160,160,176,0.7); }
    .music-cta { margin-top: 60px; display: flex; gap: 20px; }

    #book { padding: 120px 60px; max-width: 1200px; margin: 0 auto; }
    .book-layout { display: grid; grid-template-columns: 1fr 1.4fr; gap: 80px; align-items: start; }
    .book-cover { position: relative; aspect-ratio: 2/3; overflow: hidden; border: 1px solid rgba(201,168,76,0.2); }
    .book-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .book-info p { font-size: 1rem; line-height: 1.9; color: var(--silver); margin-bottom: 20px; }
    .book-quote {
      border-left: 1px solid var(--gold);
      padding-left: 28px; margin: 40px 0;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1.3rem; line-height: 1.6; color: var(--white);
    }
    .book-meta { display: flex; gap: 40px; margin-top: 40px; }
    .book-meta-item { text-align: center; }
    .book-meta-item .num { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--gold); display: block; }
    .book-meta-item .label { font-size: 0.6rem; letter-spacing: 0.2em; color: var(--silver); text-transform: uppercase; }

    .btn {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 14px 32px;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: var(--gold); color: var(--black); }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-outline { border: 1px solid rgba(201,168,76,0.4); color: var(--gold); background: transparent; }
    .btn-outline:hover { border-color: var(--gold); background: rgba(201,168,76,0.07); }

    #contact { background: var(--deep); padding: 120px 0; max-width: none; text-align: center; }
    #contact > .inner { max-width: 700px; margin: 0 auto; padding: 0 60px; }
    #contact p { color: var(--silver); margin-bottom: 40px; line-height: 1.8; }
    .contact-form { display: flex; flex-direction: column; gap: 16px; max-width: 480px; margin: 0 auto; }
    .contact-form input,
    .contact-form textarea {
      background: var(--surface);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--white);
      padding: 14px 20px;
      font-family: 'Raleway', sans-serif;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.3s;
      width: 100%;
    }
    .contact-form input:focus,
    .contact-form textarea:focus { border-color: rgba(201,168,76,0.6); }
    .contact-form textarea { resize: none; }
    .social-links { display: flex; justify-content: center; gap: 30px; margin-top: 50px; flex-wrap: wrap; }
    .social-links a {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--silver);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.3s;
    }
    .social-links a:hover { color: var(--gold); }

    footer { padding: 40px 60px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.04); }
    footer p { font-size: 0.65rem; letter-spacing: 0.15em; color: rgba(160,160,176,0.4); }
    .footer-logo { font-family: 'Cinzel', serif; font-size: 0.7rem; letter-spacing: 0.3em; color: rgba(201,168,76,0.4); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 768px) {
      nav { padding: 20px 24px; }
      .nav-links { display: none; }
      section { padding: 80px 24px; }
      #music > .inner, #contact > .inner { padding: 0 24px; }
      footer { padding: 30px 24px; flex-direction: column; gap: 12px; }
      .about-grid { grid-template-columns: 1fr; }
      .about-portrait { display: none; }
      .music-grid { grid-template-columns: 1fr; }
      .book-layout { grid-template-columns: 1fr; }
      .hero-title { font-size: 3.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#hero" class="nav-logo">Elias Reavan</a>
    <div class="nav-links">
      <a href="#about" data-nl="Over" data-en="About">Over</a>
      <a href="#music" data-nl="Muziek" data-en="Music">Muziek</a>
      <a href="#book" data-nl="Boek" data-en="Book">Boek</a>
      <a href="#contact" data-nl="Contact" data-en="Contact">Contact</a>
      <button class="lang-btn" id="langToggle">EN</button>
    </div>
  </nav>

  <section id="hero">
    <div class="hero-bg"></div>
    <div class="hero-lines"></div>
    <div class="hero-content">
